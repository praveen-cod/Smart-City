name: civic_app
description: "CityPulse — Citizen Issue Portal"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local Storage
  shared_preferences: ^2.3.3

  # Charts
  fl_chart: ^0.68.0

  # Shimmer skeleton loader
  shimmer: ^3.0.0

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
